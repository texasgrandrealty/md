name: Weekly ListTrac Sync

on:
  schedule:
    - cron: '0 16 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-listtrac-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run sync script for all properties
        run: |
          for dir in */; do
            dir="${dir%/}"
            if [ -f "$dir/config.json" ]; then
              echo "Processing property: $dir"
              python scripts/sync_stats.py "$dir"
            fi
          done
        env:
          REPORTING_EMAIL: ${{ secrets.REPORTING_EMAIL }}
          STATS_EMAIL_PASSWORD: ${{ secrets.STATS_EMAIL_PASSWORD }}

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit all updated data files
        run: |
          git add '**/data.js'
          if git diff --staged --quiet; then
            echo "No changes detected in any data.js files"
          else
            git commit -m "Automated Weekly Sync: ListTrac Data"
            git pull --rebase origin main
            git push
          fi